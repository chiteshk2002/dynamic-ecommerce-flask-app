<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Cart | SneakPeak</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body {
      background-color: #f8f9fa;
      padding-top: 40px;
    }
    .cart-container {
      background-color: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }
    h2 {
      font-weight: bold;
      margin-bottom: 25px;
    }
    .btn-update {
      background-color: #ffcc00;
      color: #000;
      border: none;
    }
    .btn-update:hover {
      background-color: #e6b800;
    }
    .btn-remove {
      background-color: #dc3545;
    }
  </style>
</head>
<body>
<div class="container cart-container">
  <h2>Your Shopping Cart</h2>

  {% if items %}
  <form method="post" action="{{ url_for('update_cart') }}">
    <table class="table table-bordered align-middle">
      <thead class="table-light">
        <tr>
          <th>Product</th>
          <th style="width: 110px;">Qty</th>
          <th>Subtotal</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        {% for item in items %}
        <tr>
          <td>{{ item.product.name }}</td>
          <td>
            <select name="quantities[{{ item.product.id }}]" class="form-select form-select-sm">
              {% for i in range(1, 11) %}
              <option value="{{ i }}" {% if item.qty == i %}selected{% endif %}>{{ i }}</option>
              {% endfor %}
            </select>
          </td>
          <td>${{ item.subtotal }}</td>
          <td>
            <a href="{{ url_for('remove_item', product_id=item.product.id) }}" class="btn btn-sm btn-remove">Remove</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <h5 class="mt-4"><strong>Total:</strong> ${{ total }}</h5>

    <div class="mt-4 d-flex gap-2">
      <button type="submit" class="btn btn-update">Update Quantities</button>
      <a href="{{ url_for('checkout') }}" class="btn btn-primary">Proceed to Checkout</a>
      <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Continue Shopping</a>
    </div>
  </form>
  {% else %}
  <p class="text-muted">Your cart is currently empty.</p>
  {% endif %}
</div>
</body>
</html>
